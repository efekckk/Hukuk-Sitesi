# ─────────────────────────────────────────────
# HTTP-ONLY — Sadece SSL sertifikası almadan önce kullan!
# Sertifika alındıktan sonra nginx.conf'a geç.
#
# Kullanım:
#   cp nginx/nginx.http-only.conf nginx/nginx.conf
#   docker compose restart nginx
#   # sertifika al...
#   cp nginx/nginx.conf.backup nginx/nginx.conf  # ya da git'ten geri al
#   docker compose restart nginx
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name DOMAIN_ADI www.DOMAIN_ADI;

    # Let's Encrypt doğrulama
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 50M;

    # Admin paneline erişimi engelle
    location /admin {
        return 404;
    }

    location /api {
        return 404;
    }

    location /_next/static/ {
        proxy_pass http://app:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Admin — port 4000 HTTP (geçici)
server {
    listen 4000;
    server_name DOMAIN_ADI;

    client_max_body_size 50M;

    location /_next/static/ {
        proxy_pass http://app:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
