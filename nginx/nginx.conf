# ─────────────────────────────────────────────
# HTTP → HTTPS yönlendirmesi + Certbot doğrulama
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name DOMAIN_ADI www.DOMAIN_ADI;

    # Let's Encrypt doğrulama için
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # SSL sertifikası alındıktan sonra HTTPS'e yönlendir
    # İlk kurulumda bu satırı yorum satırı yapın, sertifika alındıktan sonra aktif edin
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────
# HTTPS — Public site (443)
# /admin ve /api buradan erişilemez
# ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name DOMAIN_ADI www.DOMAIN_ADI;

    # SSL Sertifikaları (Certbot tarafından doldurulur)
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_ADI/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_ADI/privkey.pem;

    # Güvenli SSL ayarları
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Dosya yükleme limiti
    client_max_body_size 50M;

    # Admin paneline public port üzerinden erişimi engelle
    location /admin {
        return 404;
    }

    # API'ye public port üzerinden erişimi engelle
    location /api {
        return 404;
    }

    # Next.js static dosyalar — cache'li servis
    location /_next/static/ {
        proxy_pass http://app:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Yüklenen dosyalar (uploads)
    location /uploads/ {
        proxy_pass http://app:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # Public images
    location /images/ {
        proxy_pass http://app:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # Public site → Next.js app
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ─────────────────────────────────────────────
# Admin paneli — Port 4000 (SSL)
# Firewall ile sadece yetkili IP'lere açılmalı
# ─────────────────────────────────────────────
